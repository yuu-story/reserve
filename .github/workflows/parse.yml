name: Auto Parse Shift
on:
  push:
    paths:
      - 'storyindex.html'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          
      - name: Install dependencies
        run: npm install cheerio
        
      - name: Run parser
        run: node parse.js
        
      - name: Commit result
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          # result.jsonが変更されている場合のみコミットする
          if [ -n "$(git status --porcelain)" ]; then
            git add result.json
            git commit -m "シフト情報を自動更新しました"
            git push
          else
            echo "変更なし"
          fi
