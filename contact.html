<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ・連絡先</title>
    <!-- LINEの仕組み（LIFF）を動かすための公式スクリプト -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* 前回の予約・カウンセリングと同一のカラー・スタイルデザイン */
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #ffffff;
            color: #333;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
        }
        .contact-card {
            background-color: #f1f3f5;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: left;
        }
        .contact-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
            color: #006030;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .contact-desc {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        /* アクション用の緑色ボタン */
        .btn {
            display: block;
            width: 100%;
            padding: 13px;
            background-color: #006030;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #004d26;
        }
        /* 閉じる用のグレーのボタン */
        .close-btn {
            background-color: #6c757d;
            margin-top: 10px;
        }
        .close-btn:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>

    <h2>お問い合わせ・連絡先</h2>
    
    <!-- ▶️ お店LINE -->
    <div class="contact-card">
        <div class="contact-title">
            <span>▶️</span> お店公式LINE
        </div>
        <div class="contact-desc">
            公式の追加URLです。ご質問や確認事項、日々のやり取りなどお気軽にご登録・ご連絡ください。
        </div>
        <a href="https://line.me/ti/p/WKGoR7lHbY" target="_blank" class="btn">LINEで連絡する</a>
    </div>

    <!-- ▶️ お店メール -->
    <div class="contact-card">
        <div class="contact-title">
            <span>▶️</span> お店メール
        </div>
        <div class="contact-desc">
            <strong>story.20241101@gmail.com</strong><br>
            ※迷惑メールフォルダに振り分けられてしまう場合があります。<br>
            1日経ってもお返事がない場合はセラピストにその旨お伝えください。
        </div>
        <a href="mailto:story.20241101@gmail.com" class="btn">メールを作成する</a>
    </div>

    <!-- ▶️ お店電話 -->
    <div class="contact-card">
        <div class="contact-title">
            <span>▶️</span> お店電話
        </div>
        <div class="contact-desc">
            お急ぎの場合はお電話にてお問い合わせください。<br>
            番号：<strong>050-1720-1101</strong>
        </div>
        <!-- スマホでタップすると直接ダイヤルが立ち上がります -->
        <a href="tel:050-1720-1101" class="btn">電話をかける</a>
    </div>

    <!-- 画面を閉じるボタン -->
    <button class="btn close-btn" onclick="closeLiff()">画面を閉じる</button>

    <script>
        // LIFFの初期化
        liff.init({
            liffId: "2010734458-YMtX4qFb" // ★ここに連絡先専用の新しい「LIFF ID」を入力してください！
        }).then(() => {
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        }).catch((err) => {
            console.error('LIFFの初期化に失敗しました', err);
        });

        // 閉じるボタンが押された時の処理
        function closeLiff() {
            liff.closeWindow();
        }
    </script>
</body>
</html>
