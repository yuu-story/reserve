<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カウンセリングシート</title>
    <!-- LINEの仕組み（LIFF）を動かすための公式スクリプト -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* 前回の予約フォームと完全に同一のカラー・スタイルデザイン */
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #ffffff;
            color: #333;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 15px;
        }
        /* 必須項目の「*」マーク */
        .required::after {
            content: " *";
            color: red;
        }
        /* 入力エリア（グレーの背景、角丸） */
        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #f1f3f5;
            font-size: 16px;
        }
        /* 複数行テキスト入力の高さ固定 */
        textarea {
            height: 100px;
            resize: none;
        }
        /* 選択肢リスト（縦並び・余白） */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
            margin-bottom: 12px;
        }
        .options-list label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: normal;
            font-size: 16px;
            margin-bottom: 0;
            cursor: pointer;
        }
        /* ラジオボタンとチェックボックスのサイズ調整 */
        .options-list input[type="radio"],
        .options-list input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin: 0;
            cursor: pointer;
        }
        /* 緑色の送信ボタン */
        button {
            width: 100%;
            padding: 15px;
            background-color: #006030;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #004d26;
        }
    </style>
</head>
<body>

    <h2>カウンセリングシート</h2>
    <form id="counselingForm">
        
        <!-- 知ったきっかけ -->
        <div class="form-group">
            <label class="required">Story(又はセラピスト)を知ったきっかけ</label>
            <div class="options-list">
                <label><input type="radio" name="kikkake" value="ホームページ" checked> ホームページ</label>
                <label><input type="radio" name="kikkake" value="X（旧Twitter）"> X（旧Twitter）</label>
                <label><input type="radio" name="kikkake" value="Bluesky"> Bluesky</label>
                <label><input type="radio" name="kikkake" value="kaikan"> kaikan</label>
                <label><input type="radio" name="kikkake" value="ツイキャス"> ツイキャス</label>
                <label><input type="radio" name="kikkake" value="他店舗とのツイキャス"> 他店舗とのツイキャス</label>
                <label><input type="radio" name="kikkake" value="TikTok"> TikTok</label>
                <label><input type="radio" name="kikkake" value="YouTube"> YouTube</label>
                <label><input type="radio" name="kikkake" value="Instagram"> Instagram</label>
                <label><input type="radio" name="kikkake" value="その他"> その他</label>
            </div>
            <input type="text" id="kikkake_other" placeholder="「その他」を選んだ方はご記入ください">
        </div>

        <!-- 予約のきっかけ -->
        <div class="form-group">
            <label>今回のご予約のきっかけ(決め手となったもの)</label>
            <div class="options-list">
                <label><input type="radio" name="yoyaku_kikkake" value="特になし" checked> 特になし</label>
                <label><input type="radio" name="yoyaku_kikkake" value="口コミ"> 口コミ</label>
                <label><input type="radio" name="yoyaku_kikkake" value="ツイキャス"> ツイキャス</label>
                <label><input type="radio" name="yoyaku_kikkake" value="DM"> DM</label>
                <label><input type="radio" name="yoyaku_kikkake" value="SNS投稿"> SNS投稿</label>
                <label><input type="radio" name="yoyaku_kikkake" value="写メ日記"> 写メ日記</label>
                <label><input type="radio" name="yoyaku_kikkake" value="その他"> その他</label>
            </div>
            <input type="text" id="yoyaku_kikkake_other" placeholder="「その他」を選んだ方はご記入ください">
        </div>

        <!-- 女性用風俗の利用経験 -->
        <div class="form-group">
            <label class="required">女性用風俗の利用経験</label>
            <div class="options-list">
                <label><input type="radio" name="fuzoku_exp" value="あり" checked> あり</label>
                <label><input type="radio" name="fuzoku_exp" value="なし"> なし</label>
            </div>
        </div>

        <!-- Story利用 -->
        <div class="form-group">
            <label class="required">Story利用</label>
            <div class="options-list">
                <label><input type="radio" name="story_use" value="初めての利用" checked> 初めての利用</label>
                <label><input type="radio" name="story_use" value="利用したことがある"> 利用したことがある</label>
            </div>
        </div>

        <!-- セラピストを選んだ理由 -->
        <div class="form-group">
            <label class="required">セラピストを選んだ理由</label>
            <textarea id="therapist_reason" placeholder="お顔、雰囲気、施術内容などをご記入ください" required></textarea>
        </div>

        <!-- ご希望のコース -->
        <div class="form-group">
            <label class="required">ご希望のコース</label>
            <select id="course" required>
                <option value="コースアップ 30分5,000円 / 延長30分8,000円">コースアップ 30分5,000円 / 延長30分8,000円</option>
                <option value="90分コース" selected>90分コース</option>
                <option value="120分コース">120分コース</option>
                <option value="150分コース">150分コース</option>
                <option value="180分以上">180分以上</option>
                <option value="お泊りコース">お泊りコース</option>
                <option value="お昼寝コース">お昼寝コース</option>
                <option value="裏Storyコース">裏Storyコース</option>
                <option value="カップルコース">カップルコース</option>
            </select>
        </div>

        <!-- 施術の流れ（案内テキスト） -->
        <div class="form-group">
            <label>基本的な施術の流れ</label>
            <input type="text" value="アロママッサージ ⇒ 性感 ⇒ 指圧マッサージ" readonly style="background-color: #e9ecef; color: #495057; border: 1px dashed #ced4da;">
        </div>

        <!-- 重点的に施術を受けたい個所や配分 -->
        <div class="form-group">
            <label>重点的に施術を受けたい箇所や配分</label>
            <textarea id="focus_area" placeholder="例：肩や腰を多めに、性感は優しめで..."></textarea>
        </div>

        <!-- 一緒にお風呂 -->
        <div class="form-group">
            <label class="required">一緒にお風呂</label>
            <div class="options-list">
                <label><input type="radio" name="bath" value="入る" checked> 入る</label>
                <label><input type="radio" name="bath" value="入らない"> 入らない</label>
                <label><input type="radio" name="bath" value="最初だけ別"> 最初だけ別</label>
            </div>
        </div>

        <!-- 照明のお好み -->
        <div class="form-group">
            <label class="required">照明のお好み</label>
            <div class="options-list">
                <label><input type="radio" name="light" value="暗め" checked> 暗め</label>
                <label><input type="radio" name="light" value="明るめ"> 明るめ</label>
                <label><input type="radio" name="light" value="程よく"> 程よく</label>
                <label><input type="radio" name="light" value="おまかせ"> おまかせ</label>
            </div>
        </div>

        <!-- BGM -->
        <div class="form-group">
            <label class="required">BGM</label>
            <div class="options-list">
                <label><input type="radio" name="bgm" value="ヒーリング" checked> ヒーリング</label>
                <label><input type="radio" name="bgm" value="無音"> 無音</label>
                <label><input type="radio" name="bgm" value="おまかせ"> おまかせ</label>
            </div>
        </div>

        <!-- ご経験について -->
        <div class="form-group">
            <label>ご経験について（複数選択可）</label>
            <div class="options-list">
                <label><input type="checkbox" name="experience" value="外イキ"> 外イキ</label>
                <label><input type="checkbox" name="experience" value="中イキ"> 中イキ</label>
                <label><input type="checkbox" name="experience" value="潮吹き"> 潮吹き</label>
            </div>
        </div>

        <!-- Sですか？Mですか？ -->
        <div class="form-group">
            <label class="required">Sですか？Mですか？</label>
            <div class="options-list">
                <label><input type="radio" name="sm_type" value="S" checked> S</label>
                <label><input type="radio" name="sm_type" value="M"> M</label>
                <label><input type="radio" name="sm_type" value="どっちも"> どっちも</label>
            </div>
        </div>

        <!-- NGプレイ -->
        <div class="form-group">
            <label>NGプレイ（複数選択可）</label>
            <div class="options-list">
                <label><input type="checkbox" name="ng_play" value="キス"> キス</label>
                <label><input type="checkbox" name="ng_play" value="ハグ"> ハグ</label>
                <label><input type="checkbox" name="ng_play" value="全身リップ"> 全身リップ</label>
                <label><input type="checkbox" name="ng_play" value="フェザータッチ"> フェザータッチ</label>
                <label><input type="checkbox" name="ng_play" value="指舐め"> 指舐め</label>
                <label><input type="checkbox" name="ng_play" value="耳舐め"> 耳舐め</label>
                <label><input type="checkbox" name="ng_play" value="アナル舐め"> アナル舐め</label>
                <label><input type="checkbox" name="ng_play" value="クンニ"> クンニ</label>
                <label><input type="checkbox" name="ng_play" value="指入れ"> 指入れ</label>
                <label><input type="checkbox" name="ng_play" value="潮吹き"> 潮吹き</label>
                <label><input type="checkbox" name="ng_play" value="言葉攻め"> 言葉攻め</label>
                <label><input type="checkbox" name="ng_play" value="お腹"> お腹</label>
            </div>
        </div>

        <!-- オプション -->
        <div class="form-group">
            <label>オプション（複数選択可）</label>
            <div class="options-list">
                <label><input type="checkbox" name="options" value="おもちゃ 1,000円"> おもちゃ 1,000円（※2つまで無料）</label>
                <label><input type="checkbox" name="options" value="ソフトSM 3,000円"> ソフトSM 3,000円</label>
                <label><input type="checkbox" name="options" value="SM 5,000円"> SM 5,000円</label>
                <label><input type="checkbox" name="options" value="写真撮影 5,000円"> 写真撮影 5,000円</label>
                <label><input type="checkbox" name="options" value="動画撮影 10,000円"> 動画撮影 10,000円</label>
                <label><input type="checkbox" name="options" value="性感動画撮影 20,000円"> 性感動画撮影 20,000円</label>
            </div>
        </div>

        <!-- 希望アイテム（おもちゃ） -->
        <div class="form-group">
            <label>ご希望アイテム（おもちゃ・ソフトSMを選んだ方）</label>
            <div class="options-list">
                <label><input type="checkbox" name="toys" value="ウーマナイザー"> ウーマナイザー</label>
                <label><input type="checkbox" name="toys" value="SVR"> SVR</label>
                <label><input type="checkbox" name="toys" value="電マ"> 電マ</label>
                <label><input type="checkbox" name="toys" value="バイブ"> バイブ</label>
                <label><input type="checkbox" name="toys" value="パウダー"> パウダー</label>
            </div>
        </div>

        <button type="button" onclick="sendCounseling()">予約内容を送信する</button>
    </form>

    <script>
        // LIFFの初期化
        liff.init({
            liffId: "2010734424-1UpYUPxW" // ★ここにカウンセリング用の「LIFF ID」を入力してください！
        }).then(() => {
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        }).catch((err) => {
            console.error('LIFFの初期化に失敗しました', err);
        });

        // 送信ボタンが押された時の処理
        function sendCounseling() {
            // 単一選択（ラジオ）の取得
            const kikkake = document.querySelector('input[name="kikkake"]:checked').value;
            const kikkake_other = document.getElementById('kikkake_other').value;
            const yoyaku_kikkake = document.querySelector('input[name="yoyaku_kikkake"]:checked').value;
            const yoyaku_kikkake_other = document.getElementById('yoyaku_kikkake_other').value;
            const fuzoku_exp = document.querySelector('input[name="fuzoku_exp"]:checked').value;
            const story_use = document.querySelector('input[name="story_use"]:checked').value;
            const therapist_reason = document.getElementById('therapist_reason').value;
            const course = document.getElementById('course').value;
            const focus_area = document.getElementById('focus_area').value;
            const bath = document.querySelector('input[name="bath"]:checked').value;
            const light = document.querySelector('input[name="light"]:checked').value;
            const bgm = document.querySelector('input[name="bgm"]:checked').value;
            const sm_type = document.querySelector('input[name="sm_type"]:checked').value;

            // 必須入力チェック
            if (!therapist_reason) {
                alert('「セラピストを選んだ理由」をご入力ください。');
                return;
            }

            // 複数選択（チェックボックス）の取得
            const getCheckedValues = (name) => {
                const checked = document.querySelectorAll(`input[name="${name}"]:checked`);
                return Array.from(checked).map(el => el.value).join('、') || '特になし';
            };

            const experience = getCheckedValues('experience');
            const ng_play = getCheckedValues('ng_play');
            const options = getCheckedValues('options');
            const toys = getCheckedValues('toys');

            // 「その他」のテキスト調整
            const kikkakeText = kikkake === 'その他' && kikkake_other ? `その他（${kikkake_other}）` : kikkake;
            const yoyakuKikkakeText = yoyaku_kikkake === 'その他' && yoyaku_kikkake_other ? `その他（${yoyaku_kikkake_other}）` : yoyaku_kikkake;

            // LINEトークに送信するテキスト
            const messageText = `【カウンセリングシート】\n` +
                                `◆知ったきっかけ：${kikkakeText}\n` +
                                `◆予約の決め手：${yoyakuKikkakeText}\n` +
                                `◆女性用風俗利用歴：${fuzoku_exp}\n` +
                                `◆Story利用：${story_use}\n` +
                                `◆選んだ理由：${therapist_reason}\n` +
                                `◆希望コース：${course}\n` +
                                `◆重点箇所・配分：${focus_area || '特になし'}\n` +
                                `◆一緒にお風呂：${bath}\n` +
                                `◆照明：${light}\n` +
                                `◆BGM：${bgm}\n` +
                                `◆ご経験：${experience}\n` +
                                `◆S/M：${sm_type}\n` +
                                `◆NGプレイ：${ng_play}\n` +
                                `◆オプション：${options}\n` +
                                `◆希望おもちゃ：${toys}`;

            // LINEのトーク画面にメッセージとして直接送信する
            liff.sendMessages([{
                type: 'text',
                text: messageText
            }]).then(() => {
                liff.closeWindow();
            }).catch((err) => {
                alert('送信に失敗しました。LINEアプリ内からお試しください。');
                console.error(err);
            });
        }
    </script>
</body>
</html>
