<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story - Premium Profile</title>
    <!-- LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- FontAwesome (アイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 漆黒とシャンパンゴールドのラグジュアリーデザイン */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #e6e6e6;
            text-align: center;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 30px 20px 50px 20px;
            box-sizing: border-box;
        }
        /* プロフィールヘッダー */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #D4AF37;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            margin-bottom: 15px;
        }
        h1 {
            font-size: 22px;
            color: #D4AF37;
            margin: 5px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.2);
        }
        .subtitle {
            font-size: 12px;
            color: #8c8c8c;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        /* スケジュールエリア */
        .schedule-box {
            background: linear-gradient(135deg, #141414, #1a1a1a);
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 20px 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: left;
        }
        .schedule-header {
            font-size: 14px;
            font-weight: bold;
            color: #D4AF37;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .schedule-table tr {
            border-bottom: 1px solid #222;
        }
        .schedule-table tr:last-child {
            border-bottom: none;
        }
        .schedule-table td {
            padding: 10px 5px;
        }
        .day-col {
            font-weight: bold;
            color: #999;
            width: 35%;
        }
        .time-col {
            color: #e6e6e6;
            text-align: right;
            font-weight: 500;
        }
        .time-col.active {
            color: #D4AF37; /* 出勤日をゴールドに */
        }
        /* アクションボタン（メイン動線） */
        .main-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #1b3322, #0d2113); /* 深い高級感のあるグリーン */
            border: 1px solid #2d5437;
            color: #d4eade;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            margin-bottom: 15px;
            transition: all 0.3s;
            box-sizing: border-box;
            letter-spacing: 1px;
        }
        .main-btn:hover {
            opacity: 0.9;
        }
        .main-btn.counseling {
            background: linear-gradient(135deg, #262626, #1c1c1c); /* チャコールブラック */
            border: 1px solid #3d3d3d;
            color: #d4af37;
        }
        /* 外部SNS等へのリンクグリッド */
        .sns-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 25px;
        }
        .sns-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: #141414;
            border: 1px solid #222;
            padding: 12px;
            border-radius: 6px;
            color: #b3b3b3;
            text-decoration: none;
            font-size: 13px;
            transition: 0.2s;
        }
        .sns-item:hover {
            border-color: #D4AF37;
            color: #D4AF37;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- プロフィールヘッダー（同じフォルダのprofile.jpgを直接読み込む設定に変更） -->
        <img src="profile.jpg" alt="Profile Image" class="avatar">
        <h1>ゆう👑Story</h1>

            <table class="schedule-table">

                <tr><td class="day-col">7/18 (土)</td><td class="time-col active">12:00〜21:00</td></tr>

                <tr><td class="day-col">7/23 (木)</td><td class="time-col active">12:00〜21:00</td></tr>
            </table>
        </div>

        <!-- メイン連携ボタン -->
        <a href="https://liff.line.me/2010733799-HH18a8xi" class="main-btn">
            <i class="fa-regular fa-calendar-check"></i> ⚜️ オンラインご予約
        </a>
        <a href="https://liff.line.me/2010734424-ydvrug0g" class="main-btn counseling">
            <i class="fa-regular fa-file-lines"></i> ⚜️ カウンセリングシート
        </a>

        <!-- SNS・リンクリスト -->
        <div class="sns-grid">
            <a href="https://www.story-tokyo.com/prof/prof61/" target="_blank" class="sns-item">
                <i class="fa-solid fa-globe"></i> 公式HP
            </a>
            <a href="https://lin.ee/VdDH29H" target="_blank" class="sns-item">
                <i class="fa-brands fa-line"></i> 個人LINE
            </a>
            <a href="https://x.com/yuu_story0?s=11" target="_blank" class="sns-item">
                <i class="fa-brands fa-x-twitter"></i> X (Twitter)
            </a>
            <a href="https://bsky.app/profile/yu-story.bsky.social" target="_blank" class="sns-item">
                <i class="fa-brands fa-bluesky"></i> Bluesky
            </a>
            <a href="https://www.instagram.com/yuu_story03?igsh=MTc2Y2M3bWViYm5wbg%3D%3D&utm_source=qr" target="_blank" class="sns-item">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
            <a href="https://twitcasting.tv/c:yuu_story" target="_blank" class="sns-item">
                <i class="fa-solid fa-bullhorn"></i> ツイキャス
            </a>
        </div>
    </div>

</body>
</html>
