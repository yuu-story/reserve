<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story - Premium Profile</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; margin: 0; padding: 0; background-color: #0d0d0d; color: #e6e6e6; text-align: center; }
        .container { max-width: 480px; margin: 0 auto; padding: 30px 20px 50px 20px; box-sizing: border-box; }
        .avatar { width: 110px; height: 110px; border-radius: 50%; border: 2px solid #D4AF37; object-fit: cover; margin-bottom: 15px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        h1 { font-size: 22px; color: #D4AF37; margin: 5px 0; letter-spacing: 2px; }
        .subtitle { font-size: 12px; color: #8c8c8c; margin-bottom: 25px; }
        .schedule-box { background: linear-gradient(135deg, #141414, #1a1a1a); border: 1px solid #262626; border-radius: 12px; padding: 20px 15px; margin-bottom: 30px; text-align: left; }
        .schedule-header { font-size: 14px; font-weight: bold; color: #D4AF37; margin-bottom: 15px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .main-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: linear-gradient(135deg, #1b3322, #0d2113); border: 1px solid #2d5437; color: #d4eade; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; text-decoration: none; margin-bottom: 15px; }
        .main-btn.counseling { background: linear-gradient(135deg, #262626, #1c1c1c); border: 1px solid #3d3d3d; color: #d4af37; }
        .sns-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 25px; }
        .sns-item { display: flex; align-items: center; justify-content: center; gap: 8px; background-color: #141414; border: 1px solid #222; padding: 12px; border-radius: 6px; color: #b3b3b3; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="profile.jpg" alt="Profile Image" class="avatar">
        <h1>ゆう👑Story</h1>
        <div class="subtitle">〜 Premium Salon Story 〜</div>

        <!-- スケジュール表示エリア -->
        <div class="schedule-box">
            <div class="schedule-header"><i class="fa-regular fa-calendar-days"></i> SCHEDULE</div>
            
            <!-- SHIFT_START -->
            <table id="shift-table" style="width:100%; border-collapse: collapse; font-size: 13px;">
                <thead>
                    <tr style="color:#D4AF37; border-bottom:1px solid #333;">
                        <th style="padding:5px;">日時</th>
                        <th style="padding:5px;">時間</th>
                        <th style="padding:5px;">状況</th>
                    </tr>
                </thead>
                <tbody id="shift-body" style="color:#ccc;">
                    <tr><td colspan="3" style="text-align:center; padding:20px;">読み込み中...</td></tr>
                </tbody>
            </table>
            
            <script>
                fetch('result.json')
                    .then(response => response.json())
                    .then(data => {
                        const tbody = document.getElementById('shift-body');
                        tbody.innerHTML = ''; 
                        data.forEach(item => {
                            const row = `<tr style="border-bottom:1px solid #222;">
                                <td style="padding:8px 5px;">${item.date}</td>
                                <td style="padding:8px 5px;">${item.startTime}~${item.endTime}</td>
                                <td style="padding:8px 5px;">${item.status}</td>
                            </tr>`;
                            tbody.innerHTML += row;
                        });
                    })
                    .catch(err => {
                        document.getElementById('shift-body').innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px;">データ取得中...</td></tr>';
                    });
            </script>
            <!-- SHIFT_END -->
        </div>

        <!-- アクションボタン -->
        <a href="https://liff.line.me/2010733799-HH18a8xi" class="main-btn"><i class="fa-regular fa-calendar-check"></i> ⚜️ オンラインご予約</a>
        <a href="https://liff.line.me/2010734424-ydvrug0g" class="main-btn counseling"><i class="fa-regular fa-file-lines"></i> ⚜️ カウンセリングシート</a>

        <!-- SNSリンク -->
        <div class="sns-grid">
            <a href="https://www.story-tokyo.com/prof/prof61/" class="sns-item"><i class="fa-solid fa-globe"></i> 公式HP</a>
            <a href="https://lin.ee/VdDH29H" class="sns-item"><i class="fa-brands fa-line"></i> 個人LINE</a>
            <a href="https://x.com/yuu_story0?s=11" class="sns-item"><i class="fa-brands fa-x-twitter"></i> X (Twitter)</a>
            <a href="https://bsky.app/profile/yu-story.bsky.social" class="sns-item"><i class="fa-brands fa-bluesky"></i> Bluesky</a>
            <a href="https://www.instagram.com/yuu_story03?igsh=MTc2Y2M3bWViYm5wbg%3D%3D&utm_source=qr" class="sns-item"><i class="fa-brands fa-instagram"></i> Instagram</a>
            <a href="https://twitcasting.tv/c:yuu_story" class="sns-item"><i class="fa-solid fa-bullhorn"></i> ツイキャス</a>
        </div>
    </div>

    <script>
        liff.init({ liffId: "2010735540-NyKzUI3c" }).catch((err) => { console.error(err); });
    </script>
</body>
</html>
