<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご予約フォーム</title>
    <!-- LINEの仕組み（LIFF）を動かすための公式スクリプト -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f9f9f9; color: #333; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .radio-group { display: flex; gap: 15px; margin-top: 5px; }
        .radio-group label { font-weight: normal; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .radio-group input[type="radio"] { width: auto; }
        button { width: 100%; padding: 12px; background-color: #06C755; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #05b04b; }
    </style>
</head>
<body>

    <h2>ご予約情報の入力</h2>
    <form id="reserveForm">
        
        <div class="form-group">
            <label>お名前</label>
            <input type="text" id="name" placeholder="おなまえ" required>
        </div>

        <div class="form-group">
            <label>ご希望コース</label>
            <input type="text" id="course" placeholder="例：90分、120分" required>
        </div>

        <div class="form-group">
            <label>日付</label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label>時間</label>
            <input type="time" id="time" required>
        </div>

        <div class="form-group">
            <label>支払方法</label>
            <div class="radio-group">
                <label><input type="radio" name="payment" value="現金" checked> 現金</label>
                <label><input type="radio" name="payment" value="ｸﾚｼﾞｯﾄ"> ｸﾚｼﾞｯﾄ</label>
            </div>
        </div>

        <div class="form-group">
            <label>区分</label>
            <div class="radio-group">
                <label><input type="radio" name="type" value="新規" checked> 新規</label>
                <label><input type="radio" name="type" value="会員"> 会員</label>
            </div>
        </div>

        <div class="form-group">
            <label>指名</label>
            <div class="radio-group">
                <label><input type="radio" name="shimei" value="初指名" checked> 初指名</label>
                <label><input type="radio" name="shimei" value="本指名"> 本指名</label>
            </div>
        </div>

        <div class="form-group">
            <label>利用エリア</label>
            <input type="text" id="area" placeholder="例：池袋、新宿区、渋谷" required>
        </div>

        <div class="form-group">
            <label>合流方法</label>
            <div class="radio-group">
                <label><input type="radio" name="meet" value="ホテル先入り" checked> ホテル先入り</label>
                <label><input type="radio" name="meet" value="待ち合せ"> 待ち合せ</label>
            </div>
        </div>

        <button type="button" onclick="sendReservation()">予約内容を送信する</button>
    </form>

    <script>
        // LIFFの初期化
        liff.init({
            liffId: "2010733799-HH18a8xi" 
        }).then(() => {
            if (!liff.isLoggedIn()) {
                liff.login(); 
            }
        }).catch((err) => {
            console.error('LIFFの初期化に失敗しました', err);
        });

        // 送信処理
        async function sendReservation() {
            const name = document.getElementById('name').value;
            const course = document.getElementById('course').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const payment = document.querySelector('input[name="payment"]:checked').value;
            const type = document.querySelector('input[name="type"]:checked').value;
            const shimei = document.querySelector('input[name="shimei"]:checked').value;
            const area = document.getElementById('area').value;
            const meet = document.querySelector('input[name="meet"]:checked').value;

            if (!name || !course || !date || !time || !area) {
                alert('未入力の項目があります。');
                return;
            }

            // 【LINEアプリ内から開いた場合】
            if (liff.isInClient()) {
                const messageText = `【ご予約申込】\n` +
                                    `お名前：${name}\n` +
                                    `ご希望コース：${course}\n` +
                                    `日付：${date}\n` +
                                    `時間：${time}\n` +
                                    `支払方法：${payment}\n` +
                                    `区分：${type}\n` +
                                    `指名：${shimei}\n` +
                                    `利用エリア：${area}\n` +
                                    `合流方法：${meet}`;

                liff.sendMessages([{
                    type: 'text',
                    text: messageText
                }]).then(() => {
                    liff.closeWindow();
                }).catch((err) => {
                    alert('送信に失敗しました。');
                    console.error(err);
                });
            } else {
                // 【ブラウザ（Safari/Chromeなど）から開いた場合】
                const formData = {
                    "お名前": name,
                    "ご希望コース": course,
                    "日付": date,
                    "時間": time,
                    "支払方法": payment,
                    "区分": type,
                    "指名": shimei,
                    "利用エリア": area,
                    "合流方法": meet
                };

                // ★ここにコピーしたCloudflare WorkersのURLを貼り付けます
                const WORKERS_URL = 'https://profile.fuurontaro.workers.dev';

                try {
                    const response = await fetch(WORKERS_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(formData)
                    });

                    if (response.ok) {
                        alert('予約内容を送信しました！');
                        document.getElementById('reserveForm').reset();
                    } else {
                        alert('送信に失敗しました。時間をおいて再度お試しください。');
                    }
                } catch (err) {
                    alert('送信エラーが発生しました。');
                    console.error(err);
                }
            }
        }
    </script>
</body>
</html>
